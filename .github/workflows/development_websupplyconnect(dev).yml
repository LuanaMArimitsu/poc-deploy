name: Build and deploy to Development
on:
  push:
    branches:
      - Development
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'
      - name: Restore dependencies
        run: dotnet restore src/WebsupplyConnect.API --runtime win-x64
      - name: Build application
        run: dotnet build src/WebsupplyConnect.API --configuration Release --no-restore
      - name: Publish application
        run: dotnet publish src/WebsupplyConnect.API --configuration Release --output ./publish --self-contained --runtime win-x64 --no-restore
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish
  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_91463E9B3E4746DD9257405765CB5EC2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F905A5E29F464A918464685E08578E48 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_508AF7EA80AE4AF8B4C0885F8F5D15CF }}
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'websupplyconnect'
          slot-name: 'dev'
          package: ./publish